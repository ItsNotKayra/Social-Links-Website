<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hollowdespair</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  background: #000;
  overflow: hidden;
  font-family: 'Orbitron', sans-serif;
  cursor: none;
}

/* ══════════════════════════════
   CUSTOM DOT CURSOR (no ring)
══════════════════════════════ */
#cursor-dot {
  position: fixed;
  width: 7px; height: 7px;
  background: #fff;
  border-radius: 50%;
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%, -50%);
  box-shadow: 0 0 6px #fff, 0 0 14px rgba(255,255,255,0.5);
  transition: width 0.12s, height 0.12s;
}
body.cursor-hover #cursor-dot { width: 5px; height: 5px; }

.trail-particle {
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  transform: translate(-50%, -50%);
  animation: trail-fade 0.45s ease forwards;
}
@keyframes trail-fade {
  from { opacity: 0.5; }
  to   { opacity: 0; width: 2px !important; height: 2px !important; }
}

/* ══════════════════════════════
   CLICK TO ENTER
══════════════════════════════ */
#enter-screen {
  position: fixed; inset: 0; z-index: 100;
  background: #000;
  display: flex; align-items: center; justify-content: center; flex-direction: column;
  gap: 20px; transition: opacity 1s ease;
}
#enter-screen.fade-out { opacity: 0; pointer-events: none; }
.enter-label {
  font-size: clamp(0.65rem, 1.4vw, 0.95rem);
  letter-spacing: 8px; color: #fff; text-transform: uppercase;
  opacity: 0; animation: pulse-in 1.5s ease forwards 0.5s;
  text-shadow: 0 0 5px #fff, 0 0 15px #fff, 0 0 30px #fff;
}
.enter-hint {
  font-size: clamp(0.4rem, 0.85vw, 0.58rem);
  letter-spacing: 4px; color: rgba(255,255,255,0.3);
  opacity: 0; animation: pulse-in 1.5s ease forwards 1.2s;
}
@keyframes pulse-in {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ══════════════════════════════
   VIDEO + FALLBACK
══════════════════════════════ */
video {
  position: fixed; inset: 0; width: 100%; height: 100%;
  object-fit: cover; opacity: 0; transition: opacity 1.5s ease; z-index: 0;
}
video.visible { opacity: 1; }
.fallback-bg {
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse at 30% 40%, #1a0a2e 0%, transparent 60%),
    radial-gradient(ellipse at 70% 70%, #0d1a2e 0%, transparent 60%), #000;
}

/* ══════════════════════════════
   ATMOSPHERIC
══════════════════════════════ */
.scanlines {
  position: fixed; inset: 0; z-index: 5; pointer-events: none;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px);
  opacity: 0; transition: opacity 2s ease;
}
.scanlines.visible { opacity: 1; }
.vignette {
  position: fixed; inset: 0; z-index: 6; pointer-events: none;
  background: radial-gradient(ellipse at center, transparent 45%, rgba(0,0,0,0.85) 100%);
  opacity: 0; transition: opacity 2s ease;
}
.vignette.visible { opacity: 1; }

/* ══════════════════════════════
   EYE OVERLAY
══════════════════════════════ */
.cinematic-overlay { position: fixed; inset: 0; z-index: 10; pointer-events: none; }
.eye {
  position: absolute; left: 0; width: 100%; height: 50%;
  background: #000;
  transition: transform 2s cubic-bezier(0.7, 0, 0.2, 1); will-change: transform;
}
.eye-top { top: 0; }
.eye-bottom { bottom: 0; }
.cinematic-overlay.open .eye-top    { transform: translateY(-100%); }
.cinematic-overlay.open .eye-bottom { transform: translateY(100%); }

/* ══════════════════════════════
   VOLUME SLIDER
══════════════════════════════ */
#volume-control {
  position: fixed; top: 24px; left: 24px; z-index: 50;
  display: flex; align-items: center; gap: 10px;
  opacity: 0; transform: translateX(-10px);
  transition: opacity 0.8s ease, transform 0.8s ease;
}
#volume-control.visible { opacity: 1; transform: translateX(0); }
.vol-icon { width: 16px; height: 16px; flex-shrink: 0; }
#volume-slider {
  -webkit-appearance: none; appearance: none;
  width: 90px; height: 2px; border-radius: 2px; outline: none; cursor: none;
  background: linear-gradient(to right, #fff 0%, #fff var(--val,100%), rgba(255,255,255,0.15) var(--val,100%), rgba(255,255,255,0.15) 100%);
  box-shadow: 0 0 6px rgba(255,255,255,0.3);
}
#volume-slider::-webkit-slider-thumb {
  -webkit-appearance: none; width: 10px; height: 10px; border-radius: 50%;
  background: #fff; cursor: none;
  box-shadow: 0 0 4px #fff, 0 0 10px rgba(255,255,255,0.6);
}
#volume-slider::-moz-range-thumb {
  width: 10px; height: 10px; border: none; border-radius: 50%;
  background: #fff; cursor: none;
  box-shadow: 0 0 4px #fff, 0 0 10px rgba(255,255,255,0.6);
}

/* ══════════════════════════════
   CENTER CONTENT WRAPPER
══════════════════════════════ */
#center-content {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  display: flex; flex-direction: column; align-items: center; gap: 20px;
  z-index: 20;
  opacity: 0; transition: opacity 1.5s ease;
  width: min(90vw, 560px);
}
#center-content.show { opacity: 1; }

/* ══════════════════════════════
   MAIN TEXT
══════════════════════════════ */
.intro-label {
  font-size: clamp(0.8rem, 2vw, 1.6rem);
  letter-spacing: 4px; text-align: center; white-space: nowrap;
  mix-blend-mode: difference; color: #fff; opacity: 0.9;
  pointer-events: none; user-select: none;
  animation: none;
}
#center-content.show .intro-label { animation: flicker 3s infinite; }
@keyframes flicker {
  0%, 100% { opacity: 0.9; }
  45% { opacity: 0.75; }
  50% { opacity: 0.28; }
  55% { opacity: 0.88; }
}

/* ══════════════════════════════
   PROFILE CARD  (guns.lol style)
══════════════════════════════ */
.profile-card {
  width: 100%;
  background: rgba(0,0,0,0.55);
  border: 1px solid rgba(255,255,255,0.1);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  padding: 16px 18px;
  display: flex; flex-direction: column; gap: 10px;
  box-shadow: 0 0 30px rgba(0,0,0,0.6), 0 0 1px rgba(255,255,255,0.08);
}

/* top row: pfp + name/desc + badges */
.profile-top {
  display: flex; align-items: flex-start; gap: 14px;
}

/* profile picture */
.pfp-wrap {
  flex-shrink: 0; position: relative;
  width: 58px; height: 58px;
}
.pfp-wrap img {
  width: 100%; height: 100%;
  border-radius: 50%;
  object-fit: cover;
  border: 1px solid rgba(255,255,255,0.2);
  box-shadow: 0 0 12px rgba(255,255,255,0.1);
  display: block;
}
/* status dot */
.pfp-wrap .status-dot {
  position: absolute; bottom: 2px; right: 2px;
  width: 11px; height: 11px; border-radius: 50%;
  background: #23a559;
  border: 2px solid rgba(0,0,0,0.8);
  box-shadow: 0 0 6px rgba(35,165,89,0.7);
}

/* name + description column */
.profile-info {
  flex: 1; min-width: 0;
  display: flex; flex-direction: column; gap: 4px;
  padding-top: 2px;
}
.profile-name {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(0.85rem, 1.8vw, 1.1rem);
  font-weight: 700; letter-spacing: 2px;
  color: #fff;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.profile-desc {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(0.42rem, 0.9vw, 0.55rem);
  letter-spacing: 2px;
  color: rgba(255,255,255,0.45);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── BADGES ── */
/* ════════════════════════════════════════
   HOW TO EDIT BADGES — see README.txt
   Each .badge element = one badge icon
════════════════════════════════════════ */
.badges {
  display: flex; flex-wrap: wrap;
  gap: 5px; align-items: center;
  padding-top: 4px;
  flex-shrink: 0;
  max-width: 180px;
  justify-content: flex-end;
}
.badge {
  position: relative;
  width: 26px; height: 26px;
  display: flex; align-items: center; justify-content: center;
  cursor: none;
}
.badge img,
.badge svg {
  width: 22px; height: 22px;
  object-fit: contain;
  filter: drop-shadow(0 0 3px rgba(255,255,255,0.3));
  transition: transform 0.2s, filter 0.2s;
}
.badge:hover img,
.badge:hover svg {
  transform: scale(1.2);
  filter: drop-shadow(0 0 6px rgba(255,255,255,0.7));
}
/* tooltip on hover */
.badge::after {
  content: attr(data-tip);
  position: absolute;
  bottom: calc(100% + 7px);
  left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.85);
  border: 1px solid rgba(255,255,255,0.15);
  color: rgba(255,255,255,0.85);
  font-family: 'Orbitron', sans-serif;
  font-size: 0.42rem; letter-spacing: 2px; text-transform: uppercase;
  white-space: nowrap;
  padding: 4px 8px;
  pointer-events: none;
  opacity: 0; transition: opacity 0.2s;
  backdrop-filter: blur(8px);
  z-index: 300;
}
.badge:hover::after { opacity: 1; }

/* ── DIVIDER ── */
.card-divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
}

/* ── DISCORD ROWS (user + server) ── */
.discord-rows {
  display: flex; flex-direction: column; gap: 8px;
}
.discord-row {
  display: flex; align-items: center; gap: 12px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  padding: 8px 12px;
  transition: border-color 0.25s, background 0.25s;
  cursor: none;
}
.discord-row:hover {
  border-color: rgba(255,255,255,0.14);
  background: rgba(255,255,255,0.06);
}

.discord-row-avatar {
  width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
  object-fit: cover;
  border: 1px solid rgba(255,255,255,0.15);
}
.discord-row-info { flex: 1; min-width: 0; }
.discord-row-name {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(0.55rem, 1.1vw, 0.72rem);
  letter-spacing: 2px; color: #fff; font-weight: 700;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.discord-row-sub {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(0.38rem, 0.75vw, 0.48rem);
  letter-spacing: 2px; color: rgba(255,255,255,0.4);
  margin-top: 2px;
}
.discord-online-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: #23a559;
  box-shadow: 0 0 6px rgba(35,165,89,0.8);
  flex-shrink: 0;
}

/* server join button inside row */
.server-join-btn {
  font-family: 'Orbitron', sans-serif;
  font-size: 0.42rem; letter-spacing: 3px; text-transform: uppercase;
  color: #fff; text-decoration: none;
  border: 1px solid rgba(255,255,255,0.25);
  padding: 5px 12px;
  background: transparent;
  transition: border-color 0.2s, box-shadow 0.2s;
  cursor: none; white-space: nowrap; flex-shrink: 0;
  display: flex; align-items: center; gap: 6px;
}
.server-join-btn:hover {
  border-color: rgba(255,255,255,0.7);
  box-shadow: 0 0 10px rgba(255,255,255,0.15);
}
.server-join-btn svg { width: 10px; height: 10px; fill: currentColor; }

/* ══════════════════════════════
   JOIN US BUTTON + DISCORD POPUP
══════════════════════════════ */
.join-btn-wrap {
  position: relative;
  display: flex; flex-direction: column; align-items: center;
}

/* WIDGET — below the button */
#discord-widget-popup {
  position: absolute;
  top: calc(100% + 12px);
  left: 50%;
  transform: translateX(-50%) translateY(-6px);
  width: 290px;
  background: rgba(0,0,0,0.88);
  border: 1px solid rgba(255,255,255,0.12);
  box-shadow: 0 0 30px rgba(255,255,255,0.06), 0 20px 50px rgba(0,0,0,0.85);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  overflow: hidden;
  opacity: 0; pointer-events: none;
  transition: opacity 0.28s ease, transform 0.28s ease;
  z-index: 200;
}
/* arrow pointing UP to button */
#discord-widget-popup::before {
  content: '';
  position: absolute;
  top: -6px; left: 50%;
  transform: translateX(-50%);
  width: 10px; height: 6px;
  background: rgba(255,255,255,0.12);
  clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
}
#discord-widget-popup.visible {
  opacity: 1; pointer-events: all;
  transform: translateX(-50%) translateY(0);
}
.widget-header {
  padding: 9px 12px 7px;
  border-bottom: 1px solid rgba(255,255,255,0.07);
  display: flex; align-items: center; gap: 7px;
}
.widget-header svg { width: 13px; height: 13px; fill: rgba(255,255,255,0.6); }
.widget-header span {
  font-size: 0.48rem; letter-spacing: 4px; text-transform: uppercase;
  color: rgba(255,255,255,0.45);
}
#discord-widget-popup iframe {
  display: block; width: 100%; height: 360px; border: none; background: transparent;
}

.join-btn {
  pointer-events: all;
  display: inline-flex; align-items: center; gap: 8px;
  padding: 8px 24px;
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(0.45rem, 0.9vw, 0.58rem);
  letter-spacing: 5px; text-transform: uppercase;
  text-decoration: none; color: #fff;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.35);
  position: relative; overflow: hidden;
  transition: border-color 0.3s, box-shadow 0.3s;
  mix-blend-mode: difference; cursor: none;
}
.join-btn::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.07), transparent);
  transform: translateX(-100%); transition: transform 0.45s ease;
}
.join-btn:hover::before { transform: translateX(100%); }
.join-btn:hover { border-color: rgba(255,255,255,0.9); box-shadow: 0 0 16px rgba(255,255,255,0.12); }
.join-btn svg { width: 11px; height: 11px; fill: currentColor; flex-shrink: 0; }
.corner { position: absolute; width: 4px; height: 4px; border-color: #fff; border-style: solid; opacity: 0.6; }
.corner.tl { top:-1px; left:-1px; border-width:1px 0 0 1px; }
.corner.tr { top:-1px; right:-1px; border-width:1px 1px 0 0; }
.corner.bl { bottom:-1px; left:-1px; border-width:0 0 1px 1px; }
.corner.br { bottom:-1px; right:-1px; border-width:0 1px 1px 0; }
</style>
</head>
<body>

<!-- CURSOR -->
<div id="cursor-dot"></div>

<!-- ENTER SCREEN -->
<div id="enter-screen">
  <div class="enter-label">click to enter</div>
  <div class="enter-hint">[ tap anywhere ]</div>
</div>

<div class="fallback-bg"></div>
<video id="video" preload="auto" playsinline muted loop>
  <source src="video.mp4" type="video/mp4">
</video>
<div class="scanlines" id="scanlines"></div>
<div class="vignette"  id="vignette"></div>
<div class="cinematic-overlay" id="overlay">
  <div class="eye eye-top"></div>
  <div class="eye eye-bottom"></div>
</div>

<!-- VOLUME -->
<div id="volume-control">
  <svg class="vol-icon" viewBox="0 0 24 24" fill="none">
    <path d="M11 5L6 9H2v6h4l5 4V5z" fill="white" opacity="0.8"/>
    <path id="vol-wave1" d="M15.54 8.46a5 5 0 0 1 0 7.07" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.8"/>
    <path id="vol-wave2" d="M19.07 4.93a10 10 0 0 1 0 14.14" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.45"/>
  </svg>
  <input type="range" id="volume-slider" min="0" max="100" value="100">
</div>

<!-- CENTER CONTENT -->
<div id="center-content">

  <!-- MAIN TAG LINE -->
  <span class="intro-label">@hollowdespair | .gg/shootem</span>

  <!-- ════════════════════════════════════
       PROFILE CARD
       To edit: see README.txt
  ════════════════════════════════════ -->
  <div class="profile-card">

    <!-- TOP ROW -->
    <div class="profile-top">

      <!-- PFP: change src to any image URL -->
      <div class="pfp-wrap">
        <img id="pfp-img"
          src="https://cdn.discordapp.com/avatars/1494733304899960922/placeholder.png"
          onerror="this.src='https://ui-avatars.com/api/?name=HD&background=111&color=fff&size=128&bold=true&font-size=0.45'"
          alt="pfp">
        <div class="status-dot"></div>
      </div>

      <!-- NAME + DESCRIPTION -->
      <div class="profile-info">
        <!-- ✏️ Change display name below -->
        <div class="profile-name">hollowdespair</div>
        <!-- ✏️ Change status/description below -->
        <div class="profile-desc">currently doing nothing</div>
      </div>

      <!-- BADGES
           ✏️ To add/duplicate: copy a <div class="badge"> block
           ✏️ To change icon: replace the emoji or swap <img src="...">
           ✏️ To change tooltip: edit data-tip="..."
           Full instructions in README.txt
      -->
      <div class="badges">

        <!-- BADGE 1: Diamond / Nitro -->
        <div class="badge" data-tip="Nitro">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M12 2L15.5 8.5H20.5L16.5 13L18 20L12 16.5L6 20L7.5 13L3.5 8.5H8.5L12 2Z" fill="rgba(255,255,255,0.85)" stroke="rgba(255,255,255,0.3)" stroke-width="0.5"/>
          </svg>
        </div>

        <!-- BADGE 2: Star / Server Boost -->
        <div class="badge" data-tip="Server Boost">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6L12 2z" fill="rgba(255,255,255,0.8)" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
          </svg>
        </div>

        <!-- BADGE 3: Shield / Mod -->
        <div class="badge" data-tip="Moderator">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M12 2L4 6v6c0 5.5 3.8 10.7 8 12 4.2-1.3 8-6.5 8-12V6L12 2z" fill="rgba(255,255,255,0.8)" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
          </svg>
        </div>

        <!-- BADGE 4: Globe / Active Dev -->
        <div class="badge" data-tip="Active Developer">
          <svg viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="9" stroke="rgba(255,255,255,0.8)" stroke-width="1.5"/>
            <path d="M12 3c-2.5 3-4 5.8-4 9s1.5 6 4 9M12 3c2.5 3 4 5.8 4 9s-1.5 6-4 9M3 12h18" stroke="rgba(255,255,255,0.8)" stroke-width="1.2"/>
          </svg>
        </div>

        <!-- BADGE 5: Pen / Early Supporter -->
        <div class="badge" data-tip="Early Supporter">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M17 3a2.83 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z" fill="rgba(255,255,255,0.8)" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
          </svg>
        </div>

        <!-- BADGE 6: custom gun icon matching theme -->
        <div class="badge" data-tip="shootem">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M2 14h2v2H2v-2zm2-4h12v4H4v-4zm12 0h2l3-3v4l-3 2h-2v-3z" fill="rgba(255,255,255,0.75)" stroke="rgba(255,255,255,0.2)" stroke-width="0.4"/>
          </svg>
        </div>

      </div><!-- /badges -->
    </div><!-- /profile-top -->

    <div class="card-divider"></div>

    <!-- DISCORD ROWS -->
    <div class="discord-rows">

      <!-- YOUR DISCORD USER ROW -->
      <div class="discord-row">
        <img class="discord-row-avatar"
          src="https://ui-avatars.com/api/?name=HD&background=111&color=fff&size=64&bold=true&font-size=0.45"
          alt="user avatar">
        <div class="discord-row-info">
          <!-- ✏️ Change your Discord username below -->
          <div class="discord-row-name">hollowdespair</div>
          <!-- ✏️ Change your activity/status below -->
          <div class="discord-row-sub">currently doing nothing</div>
        </div>
        <div class="discord-online-dot"></div>
      </div>

      <!-- YOUR DISCORD SERVER ROW -->
      <div class="discord-row">
        <img class="discord-row-avatar"
          src="https://ui-avatars.com/api/?name=S&background=222&color=fff&size=64&bold=true"
          alt="server icon">
        <div class="discord-row-info">
          <!-- ✏️ Change server name below -->
          <div class="discord-row-name">/shootem</div>
          <!-- ✏️ Change member count / description below -->
          <div class="discord-row-sub">2 Online &nbsp;·&nbsp; 7 Members</div>
        </div>
        <!-- Join button with Discord widget on hover -->
        <div class="join-btn-wrap" id="join-wrap">
          <div id="discord-widget-popup">
            <div class="widget-header">

<script>
(function () {
  const enterScreen  = document.getElementById('enter-screen');
  const video        = document.getElementById('video');
  const overlay      = document.getElementById('overlay');
  const content      = document.getElementById('center-content');
  const scanlines    = document.getElementById('scanlines');
  const vignette     = document.getElementById('vignette');
  const volControl   = document.getElementById('volume-control');
  const volSlider    = document.getElementById('volume-slider');
  const volWave1     = document.getElementById('vol-wave1');
  const volWave2     = document.getElementById('vol-wave2');
  const cursorDot    = document.getElementById('cursor-dot');
  const joinWrap     = document.getElementById('join-wrap');
  const discordPopup = document.getElementById('discord-widget-popup');

  /* ── CURSOR (dot only) ── */
  let mx = -100, my = -100;
  document.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    cursorDot.style.left = mx + 'px';
    cursorDot.style.top  = my + 'px';
    const p = document.createElement('div');
    p.className = 'trail-particle';
    p.style.left = mx + 'px'; p.style.top = my + 'px';
    const s = Math.random() * 3 + 2;
    p.style.width = s + 'px'; p.style.height = s + 'px';
    p.style.background = `rgba(255,255,255,${Math.random()*0.35+0.08})`;
    p.style.boxShadow = '0 0 4px rgba(255,255,255,0.4)';
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 450);
  });

  document.querySelectorAll('a, input, .discord-row, .badge').forEach(el => {
    el.addEventListener('mouseenter', () => document.body.classList.add('cursor-hover'));
    el.addEventListener('mouseleave', () => document.body.classList.remove('cursor-hover'));
  });

  /* ── LOAD PFP FROM DISCORD WIDGET API ── */
  fetch('https://discord.com/api/guilds/1494733304899960922/widget.json')
    .then(r => r.json())
    .then(data => {
      // update member count
      const sub = document.querySelector('.discord-rows .discord-row:last-child .discord-row-sub');
      if (sub && data.presence_count !== undefined) {
        sub.textContent = data.presence_count + ' Online · ' + (data.members ? data.members.length : '7') + ' Members';
      }
    }).catch(() => {});

  /* ── DISCORD WIDGET POPUP (hover on join wrap) ── */
  let hideTimeout;
  joinWrap.addEventListener('mouseenter', () => { clearTimeout(hideTimeout); discordPopup.classList.add('visible'); });
  joinWrap.addEventListener('mouseleave', () => { hideTimeout = setTimeout(() => discordPopup.classList.remove('visible'), 180); });
  discordPopup.addEventListener('mouseenter', () => clearTimeout(hideTimeout));
  discordPopup.addEventListener('mouseleave', () => { hideTimeout = setTimeout(() => discordPopup.classList.remove('visible'), 180); });

  /* ── VOLUME ── */
  function updateTrack(val) {
    volSlider.style.setProperty('--val', val + '%');
    volWave1.style.opacity = val == 0 ? '0' : '0.8';
    volWave2.style.opacity = val < 50 ? '0' : '0.45';
  }
  volSlider.addEventListener('input', () => {
    const v = parseInt(volSlider.value);
    video.volume = v / 100; video.muted = v === 0;
    updateTrack(v);
  });

  /* ── ENTER ── */
  video.load();
  enterScreen.addEventListener('click', async () => {
    enterScreen.classList.add('fade-out');
    setTimeout(() => enterScreen.remove(), 1000);
    video.muted = false; video.volume = 0;
    try { await video.play(); }
    catch(e) { video.muted = true; await video.play().catch(()=>{}); }
    video.classList.add('visible');
    setTimeout(() => { scanlines.classList.add('visible'); vignette.classList.add('visible'); }, 400);
    setTimeout(() => overlay.classList.add('open'), 300);
    setTimeout(() => content.classList.add('show'), 1200);
    setTimeout(() => volControl.classList.add('visible'), 1600);
    setTimeout(() => {
      if (!video.muted) {
        const fade = setInterval(() => {
          video.volume = Math.min(video.volume + 0.02, 1);
          updateTrack(Math.round(video.volume * 100));
          volSlider.value = Math.round(video.volume * 100);
          if (video.volume >= 1) clearInterval(fade);
        }, 80);
      }
    }, 500);
  }, { once: true });

})();
</script>
</body>
