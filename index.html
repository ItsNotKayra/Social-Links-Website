<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>hollowdespair</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #000;
  --white: #fff;
}

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #000;
  overflow: hidden;
  font-family: 'Orbitron', sans-serif;
}

/* VIDEO */
video {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0;
  transition: opacity 1.5s ease;
}

video.visible {
  opacity: 1;
}

/* EYE OPEN EFFECT */
.cinematic-overlay {
  position: fixed;
  inset: 0;
  z-index: 10;
  pointer-events: none;
}

.eye {
  position: absolute;
  left: 0;
  width: 100%;
  height: 50%;
  background: #000;
  transition: transform 2s cubic-bezier(0.7, 0, 0.2, 1);
}

.eye-top {
  top: 0;
}

.eye-bottom {
  bottom: 0;
}

.cinematic-overlay.open .eye-top {
  transform: translateY(-100%);
}

.cinematic-overlay.open .eye-bottom {
  transform: translateY(100%);
}

/* TEXT */
.intro-text {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 2rem;
  color: #fff;
  opacity: 0;
  letter-spacing: 4px;
  text-align: center;
  z-index: 20;

  text-shadow:
    0 0 5px #fff,
    0 0 10px #fff,
    0 0 20px #fff,
    0 0 40px #fff,
    0 0 80px #fff;

  transition: opacity 1.5s ease;
}

.intro-text.show {
  opacity: 1;
}

/* subtle flicker */
@keyframes flicker {
  0%, 100% { opacity: 1; }
  45% { opacity: 0.8; }
  50% { opacity: 0.4; }
  55% { opacity: 0.9; }
}

.intro-text.show {
  animation: flicker 3s infinite;
}

/* MOBILE */
@media (max-width: 600px) {
  .intro-text {
    font-size: 1.2rem;
    letter-spacing: 2px;
  }
}
</style>
</head>

<body>

<!-- VIDEO -->
<video id="video" preload="auto" playsinline>
  <source src="video.mp4" type="video/mp4">
  <source src="video.webm" type="video/webm">
</video>

<!-- EYE OVERLAY -->
<div class="cinematic-overlay" id="overlay">
  <div class="eye eye-top"></div>
  <div class="eye eye-bottom"></div>
</div>

<!-- TEXT -->
<div class="intro-text" id="text">
  @hollowdespair | .gg/shootem
</div>

<script>
const video = document.getElementById('video');
const overlay = document.getElementById('overlay');
const text = document.getElementById('text');

// Start muted (required by browsers)
video.muted = true;
video.volume = 0;

// Wait until video is fully loaded
video.addEventListener('canplaythrough', async () => {
  try {
    await video.play();
  } catch (e) {}

  // Fade in video
  video.classList.add('visible');

  // Open eyes
  setTimeout(() => {
    overlay.classList.add('open');
  }, 300);

  // Show text
  setTimeout(() => {
    text.classList.add('show');
  }, 1200);

  // Fade in sound smoothly
  setTimeout(() => {
    video.muted = false;

    let vol = 0;
    const fade = setInterval(() => {
      vol += 0.02;
      video.volume = Math.min(vol, 1);

      if (vol >= 1) clearInterval(fade);
    }, 100);
  }, 1500);
});

// Start loading immediately
video.load();
</script>

</body>
</html>
