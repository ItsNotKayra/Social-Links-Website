<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hollowdespair</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  background: #000;
  overflow: hidden;
  font-family: 'Orbitron', sans-serif;
  cursor: none;
}

/* ══════════════════════════════
   CUSTOM NEON CURSOR
══════════════════════════════ */
#cursor-dot {
  position: fixed;
  width: 8px; height: 8px;
  background: #fff;
  border-radius: 50%;
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%, -50%);
  box-shadow: 0 0 6px #fff, 0 0 12px #fff, 0 0 24px rgba(255,255,255,0.6);
  transition: width 0.15s, height 0.15s;
}
#cursor-ring {
  position: fixed;
  width: 36px; height: 36px;
  border: 1px solid rgba(255,255,255,0.5);
  border-radius: 50%;
  pointer-events: none;
  z-index: 9998;
  transform: translate(-50%, -50%);
  box-shadow: 0 0 8px rgba(255,255,255,0.2), inset 0 0 8px rgba(255,255,255,0.05);
  transition: width 0.2s, height 0.2s, border-color 0.2s;
}
.trail-particle {
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  transform: translate(-50%, -50%);
  animation: trail-fade 0.5s ease forwards;
}
@keyframes trail-fade {
  from { opacity: 0.6; width: 6px; height: 6px; }
  to   { opacity: 0; width: 2px; height: 2px; }
}
body.cursor-hover #cursor-ring {
  width: 54px; height: 54px;
  border-color: rgba(255,255,255,0.9);
  box-shadow: 0 0 20px rgba(255,255,255,0.4), inset 0 0 12px rgba(255,255,255,0.1);
}
body.cursor-hover #cursor-dot { width: 4px; height: 4px; }

/* ══════════════════════════════
   CLICK TO ENTER
══════════════════════════════ */
#enter-screen {
  position: fixed; inset: 0; z-index: 100;
  background: #000;
  display: flex; align-items: center; justify-content: center; flex-direction: column;
  gap: 24px;
  transition: opacity 1s ease;
}
#enter-screen.fade-out { opacity: 0; pointer-events: none; }
.enter-label {
  font-size: clamp(0.7rem, 1.5vw, 1rem);
  letter-spacing: 8px; color: #fff; text-transform: uppercase;
  opacity: 0; animation: pulse-in 1.5s ease forwards 0.5s;
  text-shadow: 0 0 5px #fff, 0 0 15px #fff, 0 0 30px #fff;
}
.enter-hint {
  font-size: clamp(0.45rem, 0.9vw, 0.6rem);
  letter-spacing: 4px; color: rgba(255,255,255,0.3);
  opacity: 0; animation: pulse-in 1.5s ease forwards 1.2s;
}
@keyframes pulse-in {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ══════════════════════════════
   VIDEO + FALLBACK
══════════════════════════════ */
video {
  position: fixed; inset: 0; width: 100%; height: 100%;
  object-fit: cover; opacity: 0;
  transition: opacity 1.5s ease; z-index: 0;
}
video.visible { opacity: 1; }
.fallback-bg {
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse at 30% 40%, #1a0a2e 0%, transparent 60%),
    radial-gradient(ellipse at 70% 70%, #0d1a2e 0%, transparent 60%), #000;
}

/* ══════════════════════════════
   ATMOSPHERIC LAYERS
══════════════════════════════ */
.scanlines {
  position: fixed; inset: 0; z-index: 5; pointer-events: none;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px);
  opacity: 0; transition: opacity 2s ease;
}
.scanlines.visible { opacity: 1; }
.vignette {
  position: fixed; inset: 0; z-index: 6; pointer-events: none;
  background: radial-gradient(ellipse at center, transparent 45%, rgba(0,0,0,0.85) 100%);
  opacity: 0; transition: opacity 2s ease;
}
.vignette.visible { opacity: 1; }

/* ══════════════════════════════
   EYE OVERLAY
══════════════════════════════ */
.cinematic-overlay { position: fixed; inset: 0; z-index: 10; pointer-events: none; }
.eye {
  position: absolute; left: 0; width: 100%; height: 50%;
  background: #000;
  transition: transform 2s cubic-bezier(0.7, 0, 0.2, 1);
  will-change: transform;
}
.eye-top    { top: 0; }
.eye-bottom { bottom: 0; }
.cinematic-overlay.open .eye-top    { transform: translateY(-100%); }
.cinematic-overlay.open .eye-bottom { transform: translateY(100%); }

/* ══════════════════════════════
   VOLUME SLIDER
══════════════════════════════ */
#volume-control {
  position: fixed; top: 28px; left: 28px; z-index: 50;
  display: flex; align-items: center; gap: 12px;
  opacity: 0; transform: translateX(-10px);
  transition: opacity 0.8s ease, transform 0.8s ease;
}
#volume-control.visible { opacity: 1; transform: translateX(0); }
.vol-icon { width: 18px; height: 18px; flex-shrink: 0; opacity: 0.85; }
#volume-slider {
  -webkit-appearance: none; appearance: none;
  width: 110px; height: 3px; border-radius: 2px; outline: none;
  background: linear-gradient(to right, #fff 0%, #fff var(--val, 100%), rgba(255,255,255,0.15) var(--val, 100%), rgba(255,255,255,0.15) 100%);
  box-shadow: 0 0 6px rgba(255,255,255,0.4), 0 0 12px rgba(255,255,255,0.15);
  cursor: none;
}
#volume-slider::-webkit-slider-thumb {
  -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%;
  background: #fff; cursor: none;
  box-shadow: 0 0 4px #fff, 0 0 10px #fff, 0 0 20px rgba(255,255,255,0.7);
  transition: transform 0.15s;
}
#volume-slider::-webkit-slider-thumb:hover { transform: scale(1.3); }
#volume-slider::-moz-range-thumb {
  width: 12px; height: 12px; border: none; border-radius: 50%;
  background: #fff; cursor: none;
  box-shadow: 0 0 4px #fff, 0 0 10px #fff, 0 0 20px rgba(255,255,255,0.7);
}

/* ══════════════════════════════
   CENTER TEXT
══════════════════════════════ */
.intro-text {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  display: flex; flex-direction: column; align-items: center; gap: 28px;
  z-index: 20; opacity: 0; transition: opacity 1.5s ease;
  user-select: none;
}
.intro-text.show { opacity: 1; }
.intro-label {
  font-size: clamp(0.9rem, 2.5vw, 2rem);
  letter-spacing: 4px; text-align: center; white-space: nowrap;
  mix-blend-mode: difference; color: #fff; opacity: 0.9;
  pointer-events: none;
}
.intro-text.show .intro-label { animation: flicker 3s infinite; }
@keyframes flicker {
  0%, 100% { opacity: 0.9; }
  45%       { opacity: 0.75; }
  50%       { opacity: 0.3; }
  55%       { opacity: 0.88; }
}

/* ══════════════════════════════
   JOIN US BUTTON
══════════════════════════════ */
.join-btn-wrap {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.join-btn {
  pointer-events: all;
  display: inline-flex; align-items: center; gap: 10px;
  padding: 9px 28px;
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(0.5rem, 1vw, 0.65rem);
  letter-spacing: 5px; text-transform: uppercase;
  text-decoration: none; color: #fff;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.4);
  position: relative; overflow: hidden;
  transition: border-color 0.3s, box-shadow 0.3s;
  mix-blend-mode: difference;
  cursor: none;
}
.join-btn::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
  transform: translateX(-100%); transition: transform 0.5s ease;
}
.join-btn:hover::before { transform: translateX(100%); }
.join-btn:hover {
  border-color: rgba(255,255,255,0.95);
  box-shadow: 0 0 8px rgba(255,255,255,0.3), 0 0 20px rgba(255,255,255,0.15), inset 0 0 8px rgba(255,255,255,0.05);
}
.join-btn svg { width: 13px; height: 13px; fill: currentColor; flex-shrink: 0; }
.join-btn .corner {
  position: absolute; width: 5px; height: 5px;
  border-color: #fff; border-style: solid; opacity: 0.7;
}
.join-btn .corner.tl { top: -1px; left: -1px;   border-width: 1px 0 0 1px; }
.join-btn .corner.tr { top: -1px; right: -1px;  border-width: 1px 1px 0 0; }
.join-btn .corner.bl { bottom: -1px; left: -1px; border-width: 0 0 1px 1px; }
.join-btn .corner.br { bottom: -1px; right: -1px;border-width: 0 1px 1px 0; }

/* ══════════════════════════════
   DISCORD WIDGET POPUP
══════════════════════════════ */
#discord-widget-popup {
  position: absolute;
  bottom: calc(100% + 14px);
  left: 50%;
  transform: translateX(-50%) translateY(8px);
  width: 320px;
  background: rgba(0, 0, 0, 0.85);
  border: 1px solid rgba(255,255,255,0.15);
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.05),
    0 0 30px rgba(255,255,255,0.08),
    0 0 60px rgba(255,255,255,0.04),
    0 20px 60px rgba(0,0,0,0.8);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  overflow: hidden;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease, transform 0.3s ease;
  z-index: 200;
  mix-blend-mode: normal;
}
/* small arrow pointing down to button */
#discord-widget-popup::after {
  content: '';
  position: absolute;
  bottom: -6px; left: 50%;
  transform: translateX(-50%);
  width: 10px; height: 6px;
  background: rgba(255,255,255,0.15);
  clip-path: polygon(0 0, 100% 0, 50% 100%);
}

#discord-widget-popup.visible {
  opacity: 1;
  pointer-events: all;
  transform: translateX(-50%) translateY(0);
}

/* top bar of widget popup */
.widget-header {
  padding: 10px 14px 8px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  display: flex; align-items: center; gap: 8px;
}
.widget-header svg { width: 16px; height: 16px; fill: rgba(255,255,255,0.7); flex-shrink: 0; }
.widget-header span {
  font-size: 0.55rem; letter-spacing: 4px; text-transform: uppercase;
  color: rgba(255,255,255,0.5);
}

#discord-widget-popup iframe {
  display: block;
  width: 100%;
  height: 420px;
  border: none;
  background: transparent;
}
</style>
</head>
<body>

<!-- CUSTOM CURSOR -->
<div id="cursor-dot"></div>
<div id="cursor-ring"></div>

<!-- CLICK TO ENTER -->
<div id="enter-screen">
  <div class="enter-label">click to enter</div>
  <div class="enter-hint">[ tap anywhere ]</div>
</div>

<div class="fallback-bg"></div>

<video id="video" preload="auto" playsinline muted loop>
  <source src="Video.mp4" type="video/mp4">
</video>

<div class="scanlines" id="scanlines"></div>
<div class="vignette"  id="vignette"></div>

<div class="cinematic-overlay" id="overlay">
  <div class="eye eye-top"></div>
  <div class="eye eye-bottom"></div>
</div>

<!-- VOLUME -->
<div id="volume-control">
  <svg class="vol-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M11 5L6 9H2v6h4l5 4V5z" fill="white" opacity="0.85"/>
    <path id="vol-wave1" d="M15.54 8.46a5 5 0 0 1 0 7.07" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.85"/>
    <path id="vol-wave2" d="M19.07 4.93a10 10 0 0 1 0 14.14" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.5"/>
  </svg>
  <input type="range" id="volume-slider" min="0" max="100" value="100">
</div>

<!-- CENTER TEXT + BUTTON -->
<div class="intro-text" id="text">
  <span class="intro-label">@hollowdespair | .gg/shootem</span>

  <div class="join-btn-wrap" id="join-wrap">
    <!-- DISCORD WIDGET POPUP -->
    <div id="discord-widget-popup">
      <div class="widget-header">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
        </svg>
        <span>hollowdespair</span>
      </div>
      <iframe
        src="https://discord.com/widget?id=1494733304899960922&theme=dark"
        allowtransparency="true"
        frameborder="0"
        sandbox="allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-scripts">
      </iframe>
    </div>

    <a class="join-btn" id="join-btn" href="https://discord.gg/shootem" target="_blank" rel="noopener">
      <span class="corner tl"></span>
      <span class="corner tr"></span>
      <span class="corner bl"></span>
      <span class="corner br"></span>
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
      </svg>
      join us
    </a>
  </div>
</div>

<script>
(function () {
  const enterScreen  = document.getElementById('enter-screen');
  const video        = document.getElementById('video');
  const overlay      = document.getElementById('overlay');
  const text         = document.getElementById('text');
  const scanlines    = document.getElementById('scanlines');
  const vignette     = document.getElementById('vignette');
  const volControl   = document.getElementById('volume-control');
  const volSlider    = document.getElementById('volume-slider');
  const volWave1     = document.getElementById('vol-wave1');
  const volWave2     = document.getElementById('vol-wave2');
  const cursorDot    = document.getElementById('cursor-dot');
  const cursorRing   = document.getElementById('cursor-ring');
  const joinWrap     = document.getElementById('join-wrap');
  const discordPopup = document.getElementById('discord-widget-popup');

  /* ── CURSOR ── */
  let mx = -100, my = -100, rx = -100, ry = -100;

  document.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    cursorDot.style.left = mx + 'px';
    cursorDot.style.top  = my + 'px';

    const p = document.createElement('div');
    p.className = 'trail-particle';
    p.style.left = mx + 'px';
    p.style.top  = my + 'px';
    const size = Math.random() * 4 + 2;
    p.style.width  = size + 'px';
    p.style.height = size + 'px';
    p.style.background = `rgba(255,255,255,${Math.random() * 0.4 + 0.1})`;
    p.style.boxShadow = '0 0 4px #fff, 0 0 8px rgba(255,255,255,0.5)';
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 500);
  });

  (function animateRing() {
    rx += (mx - rx) * 0.12;
    ry += (my - ry) * 0.12;
    cursorRing.style.left = rx + 'px';
    cursorRing.style.top  = ry + 'px';
    requestAnimationFrame(animateRing);
  })();

  document.querySelectorAll('a, input, button, #enter-screen').forEach(el => {
    el.addEventListener('mouseenter', () => document.body.classList.add('cursor-hover'));
    el.addEventListener('mouseleave', () => document.body.classList.remove('cursor-hover'));
  });

  /* ── DISCORD WIDGET HOVER ── */
  let hideTimeout;

  joinWrap.addEventListener('mouseenter', () => {
    clearTimeout(hideTimeout);
    discordPopup.classList.add('visible');
  });

  joinWrap.addEventListener('mouseleave', () => {
    // small delay so moving into the iframe doesn't flicker
    hideTimeout = setTimeout(() => {
      discordPopup.classList.remove('visible');
    }, 200);
  });

  discordPopup.addEventListener('mouseenter', () => clearTimeout(hideTimeout));
  discordPopup.addEventListener('mouseleave', () => {
    hideTimeout = setTimeout(() => {
      discordPopup.classList.remove('visible');
    }, 200);
  });

  /* ── VOLUME ── */
  function updateSliderTrack(val) {
    volSlider.style.setProperty('--val', val + '%');
    volWave1.style.opacity = val == 0 ? '0' : '0.85';
    volWave2.style.opacity = val < 50 ? '0' : '0.5';
  }

  volSlider.addEventListener('input', () => {
    const val = parseInt(volSlider.value);
    video.volume = val / 100;
    video.muted  = val === 0;
    updateSliderTrack(val);
  });

  /* ── ENTER SEQUENCE ── */
  video.load();

  enterScreen.addEventListener('click', async () => {
    enterScreen.classList.add('fade-out');
    setTimeout(() => enterScreen.remove(), 1000);

    video.muted  = false;
    video.volume = 0;

    try { await video.play(); }
    catch (e) { video.muted = true; await video.play().catch(() => {}); }

    video.classList.add('visible');

    setTimeout(() => { scanlines.classList.add('visible'); vignette.classList.add('visible'); }, 400);
    setTimeout(() => overlay.classList.add('open'), 300);
    setTimeout(() => text.classList.add('show'), 1200);
    setTimeout(() => volControl.classList.add('visible'), 1600);

    setTimeout(() => {
      if (!video.muted) {
        const fade = setInterval(() => {
          video.volume = Math.min(video.volume + 0.02, 1);
          updateSliderTrack(Math.round(video.volume * 100));
          volSlider.value = Math.round(video.volume * 100);
          if (video.volume >= 1) clearInterval(fade);
        }, 80);
      }
    }, 500);
  }, { once: true });

})();
</script>
</body>
</html>
