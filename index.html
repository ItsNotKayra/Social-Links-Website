<style>

/* ── ENTER SCREEN ── */

.enter-corner.tl { top: 28px; left: 28px; border-width: 1px 0 0 1px; }
.enter-corner.tr { top: 28px; right: 28px; border-width: 1px 1px 0 0; animation-delay: 0.18s; }

.enter-bar { width: min(60vw, 220px); height: 2px; border-radius: 1px; overflow: hidden; position: relative; background: rgba(255,255,255,0.08); opacity: 0; animation: enter-fade-in 0.5s ease forwards 0.5s; }

.enter-label { margin-top: 4px; font-size: clamp(0.7rem, 1.3vw, 0.82rem); font-weight: 500; letter-spacing: 3.5px; color: #fff; text-transform: uppercase; opacity: 0; animation: enter-fade-in 0.7s ease forwards 2.1s, label-pulse 2.8s ease-in-out infinite 2.7s; }

#volume-control { position: fixed; top: 28px; left: 28px; z-index: 50; display: flex; align-items: center; gap: 12px; opacity: 0; transform: translateX(-10px); transition: opacity 0.8s ease, transform 0.8s ease; }

/* ── PROFILE CARD ── */
.profile-card { position: relative; width: min(92vw, 620px); padding: 26px 28px 22px; background: rgba(10, 10, 14, 0.55); border: 1px solid rgba(255,255,255,0.12); border-radius: 18px; backdrop-filter: blur(22px) saturate(130%); -webkit-backdrop-filter: blur(22px) saturate(130%); box-shadow: 0 0 0 1px rgba(0,0,0,0.4) inset, 0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(255,255,255,0.04); display: flex; flex-direction: column; gap: 20px; pointer-events: all; transform-style: flat; backface-visibility: hidden; will-change: transform, box-shadow; }
.profile-card::after { content: ''; position: absolute; inset: 0; border-radius: inherit; pointer-events: none; background: radial-gradient(240px 200px at var(--glare-x, 50%) var(--glare-y, 50%), rgba(255,255,255,0.26), rgba(255,255,255,0.08) 35%, rgba(255,255,255,0) 70%), linear-gradient(var(--light-angle, 135deg), rgba(255,255,255,0.10) 0%, rgba(255,255,255,0.02) 40%, rgba(255,255,255,0) 70%); opacity: 0.35; transition: opacity 0.35s ease; mix-blend-mode: screen; z-index: 5; }
.profile-card.tilt-active::after { opacity: 1; }
.profile-card > .card-rim { position: absolute; inset: 0; border-radius: inherit; pointer-events: none; z-index: 4; box-shadow: inset 0 1px 0 rgba(255,255,255, var(--rim-top, 0.10)), inset 0 -1px 0 rgba(255,255,255, var(--rim-bottom, 0.05)), inset 1px 0 0 rgba(255,255,255, var(--rim-left, 0.08)), inset -1px 0 0 rgba(255,255,255, var(--rim-right, 0.08)), inset 0 0 32px rgba(255,255,255,0.025); transition: box-shadow 0.08s linear; }
.profile-card::before { content: ''; position: absolute; top: 0; left: 10%; right: 10%; height: 1px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent); pointer-events: none; }

/* ── HEADER ── */
.profile-header { display: flex; align-items: center; gap: 18px; }
.profile-avatar { position: relative; width: 72px; height: 72px; flex-shrink: 0; }
.profile-avatar .avatar-clip { position: absolute; inset: 0; border-radius: 50%; overflow: hidden; background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.12), rgba(255,255,255,0.02)); box-shadow: inset 0 0 0 1px rgba(255,255,255,0.2), inset 0 0 20px rgba(0,0,0,0.5), 0 0 12px rgba(255,255,255,0.15); }
.avatar-ring { position: absolute; inset: -2px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.3); pointer-events: none; animation: ring-rotate 12s linear infinite; }
.avatar-ring::before { content: ''; position: absolute; top: -1px; left: 50%; width: 6px; height: 6px; background: #fff; border-radius: 50%; transform: translateX(-50%); box-shadow: 0 0 8px #fff, 0 0 16px rgba(255,255,255,0.6); }

.avatar-inner img, .avatar-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.5s ease; border-radius: 50%; }

.avatar-decoration.loaded { opacity: 1; }

/* ── IDENTITY ── */
.profile-identity { display: flex; flex-direction: column; gap: 3px; min-width: 0; flex: 1; }
.identity-name-row { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
.profile-name { margin: 0; font-size: clamp(1.25rem, 2vw, 1.6rem); font-weight: 600; letter-spacing: -0.01em; color: #fff; text-shadow: 0 0 12px rgba(255,255,255,0.25); line-height: 1.1; }

/* ── BADGES PILL ── */
.badges { display: inline-flex; align-items: center; gap: 4px; pointer-events: all; padding: 5px 8px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12); border-radius: 9px; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.3), 0 2px 8px rgba(0,0,0,0.35); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); transition: background 0.35s ease, border-color 0.35s ease; }
.badges:hover { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.2); }

.badge { position: relative; width: 22px; height: 22px; display: inline-flex; align-items: center; justify-content: center; color: #fff; cursor: none; outline: none; border-radius: 5px; background: transparent; border: 1px solid transparent; box-shadow: none; transition: background 0.4s cubic-bezier(0.25,0.8,0.25,1), border-color 0.4s cubic-bezier(0.25,0.8,0.25,1), box-shadow 0.4s cubic-bezier(0.25,0.8,0.25,1); }
.badge svg, .badge .badge-img { width: 14px; height: 14px; overflow: visible; transition: transform 0.45s cubic-bezier(0.34,1.2,0.4,1), filter 0.4s cubic-bezier(0.25,0.8,0.25,1); user-select: none; -webkit-user-drag: none; animation: badge-breathe 4s ease-in-out infinite; }
.badge:nth-child(2) svg, .badge:nth-child(2) .badge-img { animation-delay: 0.5s; }
.badge:nth-child(3) svg, .badge:nth-child(3) .badge-img { animation-delay: 1.0s; }
.badge:nth-child(4) svg, .badge:nth-child(4) .badge-img { animation-delay: 1.5s; }
.badge:nth-child(5) svg, .badge:nth-child(5) .badge-img { animation-delay: 2.0s; }
.badge:nth-child(6) svg, .badge:nth-child(6) .badge-img { animation-delay: 2.5s; }
.badge:nth-child(7) svg, .badge:nth-child(7) .badge-img { animation-delay: 3.0s; }

.badge svg { stroke: #fff; stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round; fill: none; filter: drop-shadow(0 0 2px rgba(255,255,255,0.6)) drop-shadow(0 0 5px rgba(255,255,255,0.3)); }
.badge .badge-img { object-fit: contain; filter: brightness(0) invert(1) drop-shadow(0 0 2px rgba(255,255,255,0.6)) drop-shadow(0 0 5px rgba(255,255,255,0.3)); animation-name: badge-breathe-img; }

/* Premium: filled not stroked */
.badge.badge-premium svg { stroke: none; fill: #fff; }

@keyframes badge-breathe {
  0%, 100% { filter: drop-shadow(0 0 2px rgba(255,255,255,0.6)) drop-shadow(0 0 5px rgba(255,255,255,0.3)); }
  50% { filter: drop-shadow(0 0 3px rgba(255,255,255,0.95)) drop-shadow(0 0 9px rgba(255,255,255,0.5)); }
}
@keyframes badge-breathe-img {
  0%, 100% { filter: brightness(0) invert(1) drop-shadow(0 0 2px rgba(255,255,255,0.6)) drop-shadow(0 0 5px rgba(255,255,255,0.3)); }
  50% { filter: brightness(0) invert(1) drop-shadow(0 0 3px rgba(255,255,255,0.95)) drop-shadow(0 0 9px rgba(255,255,255,0.5)); }
}

.badge:hover, .badge:focus-visible { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.35); box-shadow: 0 0 10px rgba(255,255,255,0.18), inset 0 0 8px rgba(255,255,255,0.06); }
.badge:hover svg, .badge:focus-visible svg { transform: scale(1.12); filter: drop-shadow(0 0 2px #fff) drop-shadow(0 0 7px rgba(255,255,255,0.85)) drop-shadow(0 0 14px rgba(255,255,255,0.35)); animation: none; }
.badge:hover .badge-img, .badge:focus-visible .badge-img { transform: scale(1.12); filter: brightness(0) invert(1) drop-shadow(0 0 2px #fff) drop-shadow(0 0 7px rgba(255,255,255,0.85)) drop-shadow(0 0 14px rgba(255,255,255,0.35)); animation: none; }
.badge:hover .badge-premium svg, .badge:focus-visible .badge-premium svg { stroke: none; fill: #fff; }
@media (prefers-reduced-motion: reduce) { .badge svg { animation: none; } .badge { transition: none; } }

/* ── BADGE TOOLTIP ── */
.badge-tip { position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%) translateY(6px) scale(0.96); padding: 7px 13px; font-family: inherit; font-weight: 500; font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; white-space: nowrap; background: rgba(0,0,0,0.88); border: 1px solid rgba(255,255,255,0.28); color: #fff; opacity: 0; pointer-events: none; transition: opacity 0.22s ease, transform 0.22s ease; text-shadow: 0 0 4px rgba(255,255,255,0.7), 0 0 10px rgba(255,255,255,0.3); box-shadow: 0 0 10px rgba(255,255,255,0.18); z-index: 30; }
.badge-tip::after { content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); width: 0; height: 0; border: 4px solid transparent; border-top-color: rgba(0,0,0,0.88); }
.badge:hover .badge-tip, .badge:focus-visible .badge-tip { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
.badge-tip-text { display: inline-block; }

@keyframes caret-blink { 50% { opacity: 0; } }

/* ── PROFILE ROLE (typewriter credit) ── */
.profile-role, .profile-meta { opacity: 0; transform: translateY(6px); filter: blur(4px); transition: opacity 0.8s cubic-bezier(0.2,0.7,0.2,1), transform 0.8s cubic-bezier(0.2,0.7,0.2,1), filter 0.8s cubic-bezier(0.2,0.7,0.2,1); }
.profile-role.revealed, .profile-meta.revealed { opacity: 1; transform: translateY(0); filter: blur(0); }
.profile-meta.revealed { transition-delay: 0.15s; }

.profile-role { position: relative; display: flex; flex-wrap: wrap; align-items: center; gap: 10px; font-size: 0.74rem; line-height: 1.4; margin-top: 4px; padding: 5px 10px; border: 1px solid rgba(255,255,255,0.08); border-radius: 7px; background: linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01)); box-shadow: inset 0 0 20px rgba(255,255,255,0.015); overflow: hidden; isolation: isolate; min-height: 2.2em; }
.profile-role::before { content: ''; position: absolute; top: 0; bottom: 0; left: -40%; width: 30%; background: linear-gradient(100deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.10) 45%, rgba(255,255,255,0.18) 50%, rgba(255,255,255,0.10) 55%, rgba(255,255,255,0) 100%); transform: skewX(-18deg); pointer-events: none; z-index: 0; }
.profile-role.revealed::before { animation: role-scan 6.5s cubic-bezier(0.6,0,0.4,1) 1.2s infinite; }
@keyframes role-scan { 0% { left: -40%; opacity: 0; } 8% { opacity: 1; } 40% { left: 140%; opacity: 1; } 42% { opacity: 0; } 100% { left: 140%; opacity: 0; } }
.profile-role > * { position: relative; z-index: 1; }

.profile-role .credit { display: inline-flex; align-items: baseline; gap: 7px; }
.profile-role .credit-name { font-size: 0.92rem; font-weight: 700; color: #fff; letter-spacing: 0.2px; position: relative; animation: name-breath 3.4s ease-in-out infinite; display: inline-block; min-width: 2ch; }
@keyframes name-breath {
  0%, 100% { text-shadow: 0 0 6px rgba(255,255,255,0.22), 0 0 1px rgba(255,255,255,0.5); }
  50% { text-shadow: 0 0 18px rgba(255,255,255,0.55), 0 0 2px rgba(255,255,255,0.7), 0 0 30px rgba(255,255,255,0.18); }
}
.profile-role.revealed .credit-name { animation: name-breath 3.4s ease-in-out infinite, credit-pulse 1.8s cubic-bezier(0.4,0,0.2,1) 0.25s 1 both; }
@keyframes credit-pulse { 0% { filter: brightness(1); } 25% { filter: brightness(1.45) drop-shadow(0 0 12px rgba(255,255,255,0.7)); } 100% { filter: brightness(1); } }

/* typewriter cursor inside credit-name */
.tw-cursor { display: inline-block; margin-left: 1px; color: rgba(255,255,255,0.85); animation: caret-blink 0.7s steps(2,end) infinite; font-weight: 300; }

/* ── WIDGETS ── */
.profile-widgets { display: grid; grid-template-columns: 1fr; gap: 10px; }
.widget { position: relative; padding: 12px 14px; background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02)); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; display: flex; align-items: center; gap: 12px; min-height: 62px; overflow: hidden; box-shadow: inset 0 1px 0 rgba(255,255,255,0.06), 0 2px 10px rgba(0,0,0,0.25); transition: border-color 0.35s ease, background 0.35s ease, transform 0.35s ease; }
.widget::after { content: ''; position: absolute; inset: 0; border-radius: inherit; pointer-events: none; background: radial-gradient(140% 120% at 0% 0%, rgba(255,255,255,0.05), transparent 55%); }

/* presence */
.widget-presence { position: relative; overflow: hidden; min-height: 66px; padding: 12px 14px; transition: border-color 0.5s ease, background 0.5s ease, transform 0.35s ease; }
.widget-presence:hover { transform: translateY(-1px); border-color: rgba(255,255,255,0.18); }
.presence-avatar { position: relative; width: 44px; height: 44px; flex-shrink: 0; border-radius: 10px; overflow: visible; }

<script>
(function () {

  /* ══════════════════════════════
     PROTECTION: right-click + devtools
  ══════════════════════════════ */
  document.addEventListener('contextmenu', function(e) {
    e.preventDefault();
    return false;
  });

  document.addEventListener('keydown', function(e) {
    const blocked =
      e.key === 'F12' ||
      (e.ctrlKey && e.shiftKey && /^[ijcIJC]$/.test(e.key)) ||
      (e.ctrlKey && /^[uUsS]$/.test(e.key)) ||
      (e.metaKey && e.altKey && /^[ijcIJC]$/.test(e.key));
    if (blocked) {
      e.preventDefault();
      e.stopImmediatePropagation();
      return false;
    }
  }, true);

  // Devtools size-based detection (skipped when user has zoomed the page)
  (function detectDevtools() {
    const THRESHOLD = 160;
    const initDPR = window.devicePixelRatio || 1;
    setInterval(function() {
      // If devicePixelRatio changed, the user zoomed — skip to avoid false positives
      if ((window.devicePixelRatio || 1) !== initDPR) return;
      if (
        (window.outerWidth  - window.innerWidth)  > THRESHOLD ||
        (window.outerHeight - window.innerHeight) > THRESHOLD
      ) {
        document.body.innerHTML = '';
        window.stop && window.stop();
      }
    }, 800);
  })();

  /* ══════════════════════════════
     TYPEWRITER CREDIT LOOP
     Type → wait 5s → delete → wait 5s → next
  ══════════════════════════════ */
  const TW_TEXTS        = [
    "I've failed more times than you've tried.",
    "@hollowdespairs",
    "est. 2026"
  ];
  const TW_TYPE_SPEED   = 52;    // ms / char while typing
  const TW_DELETE_SPEED = 28;    // ms / char while deleting
  const TW_HOLD         = 3000;  // ms to hold after typed
  const TW_GAP          = 500;   // ms gap after deleted before next

  const twEl = document.getElementById('tw-text');
  let twIdx = 0;
  let twTimer = null;

  function twType(text, done) {
    let i = 0;
    twEl.textContent = '';
    (function step() {
      twEl.textContent = text.slice(0, i);
      if (i++ < text.length) twTimer = setTimeout(step, TW_TYPE_SPEED);
      else twTimer = setTimeout(done, TW_HOLD);
    })();
  }

  function twErase(done) {
    (function step() {
      const t = twEl.textContent;
      if (t.length === 0) { twTimer = setTimeout(done, TW_GAP); return; }
      twEl.textContent = t.slice(0, -1);
      twTimer = setTimeout(step, TW_DELETE_SPEED);
    })();
  }

  function twLoop() {
    twType(TW_TEXTS[twIdx % TW_TEXTS.length], function() {
      twErase(function() {
        twIdx++;
        twLoop();
      });
    });
  }

  // Kick off after card appears
  setTimeout(twLoop, 2200);

  /* ══════════════════════════════
     CURSOR
  ══════════════════════════════ */
  const enterScreen  = document.getElementById('enter-screen');
  const video        = document.getElementById('video');
  const overlay      = document.getElementById('overlay');
  const text         = document.getElementById('text');
  const scanlines    = document.getElementById('scanlines');
  const vignette     = document.getElementById('vignette');
  const volControl   = document.getElementById('volume-control');
  const volSlider    = document.getElementById('volume-slider');
  const volWave1     = document.getElementById('vol-wave1');
  const volWave2     = document.getElementById('vol-wave2');
  const cursorDot    = document.getElementById('cursor-dot');
  const cursorRing   = document.getElementById('cursor-ring');

  let mx = -100, my = -100, rx = -100, ry = -100;
  let lastTrailX = -9999, lastTrailY = -9999;

  document.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    cursorDot.style.left = mx + 'px';
    cursorDot.style.top  = my + 'px';
    const dx = mx - lastTrailX, dy = my - lastTrailY;
    if (dx*dx + dy*dy < 100) return;
    lastTrailX = mx; lastTrailY = my;
    const p = document.createElement('div');
    p.className = 'trail-particle';
    p.style.cssText = `left:${mx}px;top:${my}px;width:${Math.random()*4+2}px;height:${Math.random()*4+2}px;background:rgba(255,255,255,${Math.random()*0.4+0.1});box-shadow:0 0 4px #fff,0 0 8px rgba(255,255,255,0.5)`;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 500);
  });

  document.addEventListener('mouseleave', () => document.body.classList.add('cursor-gone'));
  document.addEventListener('mouseenter', () => document.body.classList.remove('cursor-gone'));
  document.addEventListener('pointerdown', () => document.body.classList.add('cursor-pressed'));
  document.addEventListener('pointerup',   () => document.body.classList.remove('cursor-pressed'));
  document.addEventListener('pointercancel', () => document.body.classList.remove('cursor-pressed'));

  (function animRing() {
    rx += (mx - rx) * 0.12;
    ry += (my - ry) * 0.12;
    cursorRing.style.left = rx + 'px';
    cursorRing.style.top  = ry + 'px';
    requestAnimationFrame(animRing);
  })();

  document.querySelectorAll('a, input, button, .badge, .social, .widget-join, #enter-screen').forEach(el => {
    el.addEventListener('mouseenter', () => document.body.classList.add('cursor-hover'));
    el.addEventListener('mouseleave', () => document.body.classList.remove('cursor-hover'));
  });

  /* ══════════════════════════════
     3D TILT
  ══════════════════════════════ */
  const tiltCard = document.querySelector('.profile-card');
  const noMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  if (tiltCard && !noMotion) {
    const MAX = 18, EASE = 0.12, RX = 700, RY = 500;
    const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
    let tx=0,ty=0,cx=0,cy=0,mX=-9999,mY=-9999,hasM=false;

    document.addEventListener('mousemove', e=>{mX=e.clientX;mY=e.clientY;hasM=true;},{passive:true});
    document.addEventListener('mouseleave',()=>{hasM=false;});
    window.addEventListener('blur',()=>{hasM=false;});

    (function tick(){
      if(hasM){
        const r=tiltCard.getBoundingClientRect();
        if(r.width){
          const nx=clamp((mX-r.left-r.width/2)/RX,-1,1);
          const ny=clamp((mY-r.top-r.height/2)/RY,-1,1);
          ty=-nx*MAX; tx=ny*MAX;
          tiltCard.style.setProperty('--glare-x',(clamp((mX-r.left)/r.width,0,1)*100).toFixed(1)+'%');
          tiltCard.style.setProperty('--glare-y',(clamp((mY-r.top)/r.height,0,1)*100).toFixed(1)+'%');
        }
      } else { tx=0;ty=0; }
      cx+=(tx-cx)*EASE; cy+=(ty-cy)*EASE;
      if(Math.abs(cx)<0.01)cx=0; if(Math.abs(cy)<0.01)cy=0;
      hasM?tiltCard.classList.add('tilt-active'):tiltCard.classList.remove('tilt-active');
      tiltCard.style.transform=`rotateX(${cx.toFixed(2)}deg) rotateY(${cy.toFixed(2)}deg)`;
      tiltCard.style.setProperty('--light-angle',(135-cy*2.2+cx*1.4).toFixed(1)+'deg');
      const rL=clamp(cy/MAX,0,1),rR=clamp(-cy/MAX,0,1),rT=clamp(-cx/MAX,0,1),rB=clamp(cx/MAX,0,1);
      tiltCard.style.setProperty('--rim-left',(0.08+rL*0.30).toFixed(3));
      tiltCard.style.setProperty('--rim-right',(0.08+rR*0.30).toFixed(3));
      tiltCard.style.setProperty('--rim-top',(0.10+rT*0.28).toFixed(3));
      tiltCard.style.setProperty('--rim-bottom',(0.05+rB*0.22).toFixed(3));
      const m=Math.min(1,(Math.abs(cx)+Math.abs(cy))/(MAX*1.2));
      tiltCard.style.boxShadow=`${(cy*2.2).toFixed(1)}px ${(14-cx*2).toFixed(1)}px ${(55+m*45).toFixed(0)}px ${-(20+m*10).toFixed(0)}px rgba(0,0,0,${(0.55+m*0.20).toFixed(3)}),0 6px 18px -8px rgba(0,0,0,0.45),0 0 0 1px rgba(0,0,0,0.35) inset,0 1px 0 rgba(255,255,255,0.08) inset`;
      requestAnimationFrame(tick);
    })();
  }

  /* ── VOLUME ── */
  function updateSliderTrack(val) {
    volSlider.style.setProperty('--val', val + '%');
    volWave1.style.opacity = val == 0 ? '0' : '0.85';
    volWave2.style.opacity = val < 50 ? '0' : '0.5';
  }
  let volFadeInterval=null, userVol=false;
  const stopFade=()=>{if(volFadeInterval){clearInterval(volFadeInterval);volFadeInterval=null;}};
  volSlider.addEventListener('input',()=>{userVol=true;stopFade();const v=parseInt(volSlider.value);video.volume=v/100;video.muted=v===0;updateSliderTrack(v);});
  ['pointerdown','mousedown','touchstart','keydown','wheel'].forEach(ev=>volSlider.addEventListener(ev,()=>{userVol=true;stopFade();},{passive:true}));

  /* ── ENTER ── */
  video.load();

  const keyH = (e)=>{if(e.key==='Enter'||e.key===' '||e.code==='Space'){e.preventDefault();document.removeEventListener('keydown',keyH);enterScreen.click();}};
  document.addEventListener('keydown', keyH);

  enterScreen.addEventListener('click', async () => {
    document.removeEventListener('keydown', keyH);
    enterScreen.classList.add('fade-out');
    setTimeout(()=>enterScreen.remove(),1000);
    video.muted=false; video.volume=0;
    try{await video.play();}catch(e){video.muted=true;await video.play().catch(()=>{});}
    video.classList.add('visible');
    setTimeout(()=>{scanlines.classList.add('visible');vignette.classList.add('visible');},400);
    setTimeout(()=>overlay.classList.add('open'),300);
    setTimeout(()=>text.classList.add('show'),1200);
    setTimeout(()=>volControl.classList.add('visible'),1600);
    setTimeout(()=>{
      if(video.muted||userVol)return;
      stopFade();
      volFadeInterval=setInterval(()=>{
        if(userVol){stopFade();return;}
        video.volume=Math.min(video.volume+0.02,1);
        const p=Math.round(video.volume*100);
        updateSliderTrack(p);volSlider.value=p;
        if(video.volume>=1)stopFade();
      },80);
    },500);
  },{once:true});

  /* ── BADGE TOOLTIPS (typewriter) ── */
  document.querySelectorAll('.badge, .social').forEach(el=>{
    const tip=el.dataset.tip||'';
    const tEl=el.querySelector('.badge-tip-text');
    if(!tEl)return;
    let t=null;
    const type=()=>{clearTimeout(t);let i=0;tEl.textContent='';(function s(){if(i<=tip.length){tEl.textContent=tip.slice(0,i++);t=setTimeout(s,55);}})();};
    const stop=()=>clearTimeout(t);
    el.addEventListener('mouseenter',type);el.addEventListener('focus',type);
    el.addEventListener('mouseleave',stop);el.addEventListener('blur',stop);
  });

  /* ── WATERMARK ── */
  setTimeout(()=>document.getElementById('watermark').classList.add('show'),2400);

  /* ══════════════════════════════
     REVEAL ORCHESTRATION
  ══════════════════════════════ */
  const roleEls=document.querySelectorAll('.profile-role,.profile-meta');
  let pReady=false,sReady=false,revealed=false;
  function tryReveal(){if(revealed)return;if(pReady&&sReady){revealed=true;roleEls.forEach(e=>e.classList.add('revealed'));}}
  setTimeout(()=>{if(!revealed){revealed=true;roleEls.forEach(e=>e.classList.add('revealed'));}},6000);
  window.__hdMark=key=>{if(key==='presence')pReady=true;if(key==='server')sReady=true;tryReveal();};

  /* ── SERVER STATS ── */
  const onlineEl=document.getElementById('server-online');
  const membersEl=document.getElementById('server-members');
  if(onlineEl&&membersEl){
    const fmt=n=>(n??0).toLocaleString('en-US');
    async function pull(){
      try{
        const r=await fetch('https://discord.com/api/v10/invites/shootem?with_counts=true&with_expiration=false',{headers:{'Accept':'application/json'}});
        if(!r.ok)throw 0;
        const j=await r.json();
        if(typeof j.approximate_member_count==='number')membersEl.textContent=fmt(j.approximate_member_count);
        if(typeof j.approximate_presence_count==='number')onlineEl.textContent=fmt(j.approximate_presence_count);
      }catch(_){onlineEl.textContent='—';membersEl.textContent='—';}
      finally{window.__hdMark('server');}
    }
    pull();setInterval(pull,60000);
  }else{window.__hdMark('server');}

  /* ══════════════════════════════
     LANYARD PRESENCE
  ══════════════════════════════ */
  const DID='676857166363361291';
  const presEl=document.getElementById('presence-widget');
  const presTag=document.getElementById('presence-tag');
  const presTitle=document.getElementById('presence-title');
  const presSub=document.getElementById('presence-sub');
  const presDot=document.getElementById('presence-status-dot');
  const presImg=document.getElementById('presence-avatar-img');
  const presBar=document.getElementById('presence-progress');
  const presBarFill=document.getElementById('presence-progress-bar');
  const profDec=document.getElementById('profile-avatar-decoration');

  function setTag(t){if(!presTag)return;if(!t){presTag.hidden=true;presTag.textContent='';}else{presTag.hidden=false;presTag.textContent=t;}}

  if(presEl){
    const SL={online:'Online',idle:'Idle',dnd:'Do Not Disturb',offline:'Offline'};
    let spTimer=null;
    const LA=ext=>`https://api.lanyard.rest/${DID}.${ext}`;
    const avUrl=u=>u&&u.avatar?`https://cdn.discordapp.com/avatars/${u.id}/${u.avatar}.${u.avatar.startsWith('a_')?'gif':'png'}?size=128`:LA('png');
    presImg.src=LA('png');
    const decUrl=a=>a?`https://cdn.discordapp.com/avatar-decoration-presets/${a}.png?size=240&passthrough=true`:null;

    function applyDec(u){
      if(!profDec||!u)return;
      const a=u.avatar_decoration_data&&u.avatar_decoration_data.asset;
      const url=decUrl(a);
      if(url){if(profDec.dataset.src!==url){profDec.dataset.src=url;profDec.hidden=false;profDec.classList.remove('loaded');profDec.onload=()=>profDec.classList.add('loaded');profDec.onerror=()=>{profDec.hidden=true;profDec.removeAttribute('src');};profDec.src=url;}}
      else{profDec.hidden=true;profDec.classList.remove('loaded');profDec.removeAttribute('src');}
    }

    function render(data){
      clearInterval(spTimer);spTimer=null;
      if(!data||!data.discord_user){presEl.dataset.state='error';setTag('');presTitle.textContent='Not tracked by Lanyard';presSub.textContent='join discord.gg/lanyard';presDot.dataset.status='offline';window.__hdMark&&window.__hdMark('presence');return;}
      presEl.dataset.state='live';presEl.classList.remove('is-spotify','is-playing','is-custom');presBar.hidden=true;presBarFill.style.width='0%';window.__hdMark&&window.__hdMark('presence');
      const{discord_user,discord_status,activities,listening_to_spotify,spotify}=data;
      presDot.dataset.status=discord_status||'offline';applyDec(discord_user);
      if(listening_to_spotify&&spotify){
        presEl.classList.add('is-spotify');setTag('Listening on Spotify');presImg.src=spotify.album_art_url||avUrl(discord_user);presTitle.textContent=spotify.song||'—';presSub.textContent=`by ${spotify.artist||'—'}`;
        if(spotify.timestamps&&spotify.timestamps.start&&spotify.timestamps.end){
          presBar.hidden=false;const s=spotify.timestamps.start,e=spotify.timestamps.end,d=e-s;
          const tick=()=>{presBarFill.style.width=Math.max(0,Math.min(100,((Date.now()-s)/d)*100))+'%';};tick();spTimer=setInterval(tick,1000);
        }return;
      }
      const game=activities&&activities.find(a=>a.type===0);
      const stream=activities&&activities.find(a=>a.type===1);
      const watch=activities&&activities.find(a=>a.type===3);
      const custom=activities&&activities.find(a=>a.type===4);
      const act=game||stream||watch;
      presImg.src=avUrl(discord_user);
      if(act){presEl.classList.add('is-playing');const v=act.type===1?'Streaming':act.type===3?'Watching':'Playing';setTag(v);presTitle.textContent=act.name||'—';presSub.textContent=act.details||act.state||SL[discord_status]||'';return;}
      if(custom){presEl.classList.add('is-custom');const em=custom.emoji?(custom.emoji.id?'':(custom.emoji.name||'')+' '):'';const st=custom.state||'';setTag('Custom Status');presTitle.textContent=(em+st).trim()||(discord_user.global_name||discord_user.username);presSub.textContent=SL[discord_status]||'Offline';return;}
      setTag(SL[discord_status]||'Offline');presTitle.textContent=discord_user.global_name||discord_user.username||'hollowdespairs';presSub.textContent=`@${discord_user.username||'unknown'}`;
    }

    let ws=null,hb=null,rcTimer=null,itTimer=null,gotInit=false;
    async function restCheck(){if(gotInit)return;try{const r=await fetch(`https://api.lanyard.rest/v1/users/${DID}`);const j=await r.json();if(j&&j.success&&j.data){render(j.data);gotInit=true;}else{presEl.dataset.state='error';presTitle.textContent='Not tracked by Lanyard';presSub.textContent='join discord.gg/lanyard';}}catch(_){presEl.dataset.state='error';presTitle.textContent='Connection failed';presSub.textContent='retrying…';}}
    function connect(){clearTimeout(rcTimer);gotInit=false;try{ws=new WebSocket('wss://api.lanyard.rest/socket');}catch(e){sched();return;}
      ws.addEventListener('message',ev=>{let m;try{m=JSON.parse(ev.data);}catch(_){return;}const{op,t,d}=m;
        if(op===1){ws.send(JSON.stringify({op:2,d:{subscribe_to_id:DID}}));const iv=(d&&d.heartbeat_interval)||30000;clearInterval(hb);hb=setInterval(()=>{if(ws&&ws.readyState===1)ws.send(JSON.stringify({op:3}));},iv);clearTimeout(itTimer);itTimer=setTimeout(restCheck,6000);}
        else if(op===0&&(t==='INIT_STATE'||t==='PRESENCE_UPDATE')){gotInit=true;clearTimeout(itTimer);render(d);}
      });
      ws.addEventListener('close',sched);ws.addEventListener('error',()=>{try{ws.close();}catch(_){}});
    }
    function sched(){clearInterval(hb);clearTimeout(itTimer);hb=null;presEl.dataset.state='error';rcTimer=setTimeout(connect,4000);}
    setTimeout(connect,1500);
  }

})();
</script>
</body>
</html>
