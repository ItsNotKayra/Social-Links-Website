<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>sudo -rm -rf /</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  height:100%;
  background:#000;
  overflow:hidden;
  font-family:"JetBrains Mono", monospace;
  cursor:none;
}

/* BACKGROUND */

body::before{
  content:'';
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at top left, rgba(255,255,255,0.08), transparent 35%),
    radial-gradient(circle at bottom right, rgba(255,255,255,0.05), transparent 40%),
    #000;
  z-index:-2;
}

video{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:.28;
  z-index:-1;
}

/* CURSOR */

#cursor-dot{
  position:fixed;
  width:8px;
  height:8px;
  border-radius:50%;
  background:#fff;
  pointer-events:none;
  z-index:9999;
  transform:translate(-50%,-50%);
  box-shadow:
    0 0 8px #fff,
    0 0 20px rgba(255,255,255,.7);
}

#cursor-ring{
  position:fixed;
  width:34px;
  height:34px;
  border:1px solid rgba(255,255,255,.5);
  border-radius:50%;
  pointer-events:none;
  z-index:9998;
  transform:translate(-50%,-50%);
}

/* ENTER */

#enter-screen{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  gap:20px;
  z-index:100;
}

.enter-title{
  color:#fff;
  font-size:2rem;
  letter-spacing:5px;
  text-transform:uppercase;
}

.enter-button{
  padding:12px 28px;
  border:1px solid rgba(255,255,255,.2);
  background:rgba(255,255,255,.05);
  color:#fff;
  font-family:inherit;
  letter-spacing:3px;
  text-transform:uppercase;
  backdrop-filter:blur(10px);
}

/* PROFILE */

.wrapper{
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  perspective:1600px;
}

.profile-card{

  position:relative;

  width:min(92vw,620px);

  padding:28px;

  border-radius:24px;

  background:
    linear-gradient(
      135deg,
      rgba(255,255,255,.08),
      rgba(255,255,255,.02)
    );

  border:1px solid rgba(255,255,255,.1);

  backdrop-filter:blur(24px);

  box-shadow:
    0 20px 60px rgba(0,0,0,.55),
    inset 0 1px 0 rgba(255,255,255,.08);

  transform-style:preserve-3d;

  will-change:transform;

  transition:
    box-shadow .3s ease,
    border-color .3s ease;
}

/* REAL DEPTH */

.profile-header{
  display:flex;
  gap:18px;
  align-items:center;
  transform:translateZ(80px);
}

.profile-avatar{
  width:78px;
  height:78px;
  border-radius:50%;
  overflow:hidden;
  flex-shrink:0;
  transform:translateZ(120px);
  box-shadow:
    0 0 25px rgba(255,255,255,.15);
}

.profile-avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.profile-content{
  flex:1;
  min-width:0;
  transform:translateZ(70px);
}

.profile-name{
  color:#fff;
  font-size:1.6rem;
  font-weight:700;
}

.profile-role{
  margin-top:6px;
  color:rgba(255,255,255,.55);
  font-size:.82rem;
}

/* BADGES */

.badges{
  display:flex;
  gap:8px;
  margin-top:14px;
  transform:translateZ(90px);
}

.badge{
  width:28px;
  height:28px;
  border-radius:8px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.1);
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-size:.72rem;
  transition:.25s;
}

.badge:hover{
  transform:translateY(-2px) scale(1.06);
  box-shadow:
    0 0 15px rgba(255,255,255,.25);
}

/* WIDGETS */

.widgets{
  margin-top:22px;
  display:grid;
  gap:12px;
  transform:translateZ(50px);
}

.widget{
  position:relative;

  display:flex;
  align-items:center;
  gap:14px;

  padding:14px;

  border-radius:16px;

  background:
    linear-gradient(
      135deg,
      rgba(255,255,255,.06),
      rgba(255,255,255,.02)
    );

  border:1px solid rgba(255,255,255,.08);

  overflow:hidden;

  transform:translateZ(40px);
}

.widget-avatar{
  width:48px;
  height:48px;
  border-radius:14px;
  overflow:hidden;
  flex-shrink:0;
}

.widget-avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.widget-info{
  flex:1;
  min-width:0;
}

.widget-title{
  color:#fff;
  font-size:.82rem;
  font-weight:600;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.widget-sub{
  margin-top:3px;
  color:rgba(255,255,255,.5);
  font-size:.68rem;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

/* SPOTIFY */

.spotify{
  border-color:rgba(30,215,96,.25);
}

.spotify .widget-avatar img{
  border-radius:50%;
  animation:spin 7s linear infinite;
}

.spotify-progress{
  position:absolute;
  left:0;
  bottom:0;
  width:100%;
  height:2px;
  background:rgba(255,255,255,.06);
}

.spotify-progress-bar{
  width:0%;
  height:100%;
  background:#1ed760;
}

@keyframes spin{
  to{
    transform:rotate(360deg);
  }
}

/* FOOTER */

.footer{
  margin-top:20px;
  color:rgba(255,255,255,.22);
  font-size:.6rem;
  letter-spacing:2px;
  text-transform:uppercase;
  text-align:right;
  transform:translateZ(20px);
}

</style>
</head>

<body>

<video autoplay muted loop playsinline>
  <source src="video.mp4" type="video/mp4">
</video>

<div id="cursor-dot"></div>
<div id="cursor-ring"></div>

<div id="enter-screen">
  <div class="enter-title">@hollowdespairs</div>
  <button class="enter-button">enter</button>
</div>

<div class="wrapper">

  <div class="profile-card" id="profile-card">

    <div class="profile-header">

      <div class="profile-avatar">
        <img src="assets/avatar.png">
      </div>

      <div class="profile-content">

        <div class="profile-name">
          @hollowdespairs
        </div>

        <div class="profile-role" id="typewriter">
          loading...
        </div>

        <div class="badges">
          <div class="badge">DEV</div>
          <div class="badge">OG</div>
          <div class="badge">VIP</div>
          <div class="badge">WIN</div>
        </div>

      </div>

    </div>

    <div class="widgets">

      <!-- PRESENCE -->

      <div class="widget" id="presence-widget">

        <div class="widget-avatar">
          <img id="presence-avatar">
        </div>

        <div class="widget-info">

          <div class="widget-title" id="presence-title">
            Connecting...
          </div>

          <div class="widget-sub" id="presence-sub">
            Lanyard Presence
          </div>

        </div>

      </div>

      <!-- SPOTIFY -->

      <div class="widget spotify" id="spotify-widget">

        <div class="widget-avatar">
          <img id="spotify-cover">
        </div>

        <div class="widget-info">

          <div class="widget-title" id="spotify-song">
            Not Playing
          </div>

          <div class="widget-sub" id="spotify-artist">
            Spotify
          </div>

        </div>

        <div class="spotify-progress">
          <div class="spotify-progress-bar" id="spotify-progress"></div>
        </div>

      </div>

    </div>

    <div class="footer">
      sudo rm -rf /
    </div>

  </div>

</div>

<script>

/* CURSOR */

const dot = document.getElementById('cursor-dot');
const ring = document.getElementById('cursor-ring');

let mx = 0;
let my = 0;

let rx = 0;
let ry = 0;

document.addEventListener('mousemove', e => {

  mx = e.clientX;
  my = e.clientY;

  dot.style.left = mx + 'px';
  dot.style.top  = my + 'px';
});

function animateCursor(){

  rx += (mx - rx) * 0.15;
  ry += (my - ry) * 0.15;

  ring.style.left = rx + 'px';
  ring.style.top  = ry + 'px';

  requestAnimationFrame(animateCursor);
}

animateCursor();

/* ENTER */

document.querySelector('.enter-button').onclick = () => {

  document.getElementById('enter-screen').style.display = 'none';

  document.querySelector('video').muted = false;
};

/* TYPEWRITER */

const texts = [
  "I've failed more times than you've tried.",
  "@hollowdespairs",
  "est. 2026"
];

const typewriter = document.getElementById('typewriter');

let index = 0;

function loopText(){

  const text = texts[index];

  let i = 0;

  typewriter.textContent = '';

  const type = setInterval(() => {

    typewriter.textContent =
      text.slice(0, i);

    i++;

    if(i > text.length){

      clearInterval(type);

      setTimeout(() => {

        index = (index + 1) % texts.length;

        loopText();

      }, 2200);
    }

  }, 45);
}

loopText();

/* REAL PARALLAX */

const card = document.getElementById('profile-card');

let currentX = 0;
let currentY = 0;

let targetX = 0;
let targetY = 0;

document.addEventListener('mousemove', e => {

  const rect = card.getBoundingClientRect();

  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  const centerX = rect.width / 2;
  const centerY = rect.height / 2;

  targetX = ((x - centerX) / centerX) * 12;
  targetY = ((y - centerY) / centerY) * 12;
});

function animateCard(){

  currentX += (targetX - currentX) * 0.08;
  currentY += (targetY - currentY) * 0.08;

  card.style.transform = `
    rotateX(${-currentY}deg)
    rotateY(${currentX}deg)
    translateY(-3px)
  `;

  requestAnimationFrame(animateCard);
}

animateCard();

/* LANYARD */

const DISCORD_ID = '676857166363361291';

const presenceTitle =
  document.getElementById('presence-title');

const presenceSub =
  document.getElementById('presence-sub');

const presenceAvatar =
  document.getElementById('presence-avatar');

const spotifyWidget =
  document.getElementById('spotify-widget');

const spotifySong =
  document.getElementById('spotify-song');

const spotifyArtist =
  document.getElementById('spotify-artist');

const spotifyCover =
  document.getElementById('spotify-cover');

const spotifyProgress =
  document.getElementById('spotify-progress');

async function fetchPresence(){

  try{

    const res =
      await fetch(
        `https://api.lanyard.rest/v1/users/${DISCORD_ID}`
      );

    const json = await res.json();

    const data = json.data;

    if(!data) return;

    const user = data.discord_user;

    presenceAvatar.src =
      `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png?size=256`;

    presenceTitle.textContent =
      user.global_name || user.username;

    presenceSub.textContent =
      data.discord_status;

    /* SPOTIFY */

    const acts = Array.isArray(data.activities)
      ? data.activities
      : [];

    const spotify =
      acts.find(
        a =>
          a.name === 'Spotify' ||
          a.type === 2
      );

    if(spotify){

      spotifyWidget.style.display = 'flex';

      const image =
        spotify.assets.large_image.replace(
          'spotify:',
          ''
        );

      spotifyCover.src =
        `https://i.scdn.co/image/${image}`;

      spotifySong.textContent =
        spotify.details || 'Unknown Song';

      spotifyArtist.textContent =
        spotify.state || 'Unknown Artist';

      if(
        spotify.timestamps &&
        spotify.timestamps.start &&
        spotify.timestamps.end
      ){

        const start =
          spotify.timestamps.start;

        const end =
          spotify.timestamps.end;

        const duration =
          end - start;

        function updateProgress(){

          const progress =
            ((Date.now() - start) / duration) * 100;

          spotifyProgress.style.width =
            Math.min(progress, 100) + '%';
        }

        updateProgress();

        setInterval(updateProgress, 1000);
      }

    }else{

      spotifySong.textContent =
        'Not Playing';

      spotifyArtist.textContent =
        'Spotify';

      spotifyProgress.style.width = '0%';
    }

  }catch(err){

    console.error(err);
  }
}

fetchPresence();

setInterval(fetchPresence, 10000);

</script>

</body>
</html>
