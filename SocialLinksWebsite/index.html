<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Bio Links</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Bebas+Neue&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <!-- Volume Control -->
  <div class="volume-control" id="volumeControl">
    <svg class="volume-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
      <path d="M15.54 8.46a7 7 0 0 1 0 9.9"></path>
      <path d="M17.11 11.05a3 3 0 0 1 0 4.24"></path>
    </svg>
    <input type="range" id="volumeSlider" class="volume-slider" min="0" max="100" value="10" />
  </div>

  <!-- Animated Gradient Background -->
  <div class="bg-gradient"></div>
  <div class="bg-flames"></div>

  <!-- Dark Overlay -->
  <div class="bg-overlay"></div>

  <!-- Background Video -->
  <video id="introVideo" class="intro-video" preload="metadata" autoplay muted playsinline>
    <source src="video.webm" type="video/webm" />
    <source src="video.mp4" type="video/mp4" />
    Your browser does not support the video tag.
  </video>

  <!-- Splash Screen Intro -->
  <div class="splash-screen" id="splashScreen">
    <div class="splash-content">
      <p class="splash-text">Click to enter</p>
    </div>
  </div>

  <!-- Content -->
  <div class="container" id="mainContent" style="display: none;">
    <!-- Profile Section -->
    <section class="profile-section">
      <div class="avatar-wrapper">
        <div class="avatar" id="avatar-image"></div>
      </div>

      <h1 class="profile-name" data-text="ItsNotKayra">ItsNotKayra</h1>
      <p class="profile-bio">Streamer | Gamer | Content Creator</p>

      <p class="profile-status">
        <svg class="status-icon" viewBox="0 0 24 24" fill="currentColor">
          <circle cx="12" cy="12" r="8"></circle>
        </svg>
        Check out my socials below.
      </p>
    </section>

    <!-- Links Section -->
    <section class="links-section">
      <div class="link-card" data-link="https://www.youtube.com/@ItsNotKayra">
        <img class="link-icon" src="https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/youtube-app-white-icon.png" alt="YouTube">
        <div class="link-content">
          <h3>YouTube</h3>
          <p>Subscribe to my channel</p>
        </div>
        <svg class="link-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M5 12h14M12 5l7 7-7 7"></path>
        </svg>
      </div>

      <div class="link-card" data-link="https://www.tiktok.com/@itsnot.kayra">
        <img class="link-icon" src="https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/tiktok-simplified-white-icon.png" alt="TikTok">
        <div class="link-content">
          <h3>TikTok</h3>
          <p>Follow me on TikTok</p>
        </div>
        <svg class="link-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M5 12h14M12 5l7 7-7 7"></path>
        </svg>
      </div>

      <div class="link-card" data-link="https://discord.gg/9tNWxHT5GJ">
        <img class="link-icon" src="https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/discord-white-icon.png" alt="Discord">
        <div class="link-content">
          <h3>Discord</h3>
          <p>Join the community</p>
        </div>
        <svg class="link-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M5 12h14M12 5l7 7-7 7"></path>
        </svg>
      </div>

      <div class="link-card" data-link="https://www.roblox.com/users/659540539/profile">
        <img class="link-icon" src="https://static.wikia.nocookie.net/logopedia/images/d/d4/Roblox_2018_O_Icon_final_-_White.svg/revision/latest/scale-to-width-down/250?cb=20190809191240" alt="Roblox">
        <div class="link-content">
          <h3>Roblox</h3>
          <p>Check out my profile</p>
        </div>
        <svg class="link-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M5 12h14M12 5l7 7-7 7"></path>
        </svg>
      </div>
    </section>

    <footer class="footer">
      <p>
        Created by ItsNotKayra
        <svg class="footer-icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path>
        </svg>
      </p>
    </footer>
  </div>

  <script defer src="script.js"></script>
</body>
</html>
